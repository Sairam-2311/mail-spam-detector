<!DOCTYPE html>
<html>
<head>
  <title>Email Spam Detector</title>
  <style>
    body { font-family: Arial; background: #fffefe;
           display: flex; justify-content: center;
           align-items: center; min-height: 100vh; margin: 0; }
    .container { background: rgb(132, 131, 131); padding: 30px;
                 border-radius: 15px; width: 500px; }
    textarea { width: 100%; height: 150px; padding: 10px;
               box-sizing: border-box; border-radius: 8px; }
    button { padding: 10px 20px; background: #d85a30;
             color: white; border: none; border-radius: 8px; }
    .spam { color: red; font-weight: bold; }
    .ham  { color: green; font-weight: bold; }
    .error { color: #c0392b; background: #fdecea;
             padding: 10px; border-radius: 8px; }
    .confidence { font-size: 13px; color: #666; }
  </style>
</head>
<body>
<div class="container">
  <h1>Email Spam Detector</h1>
  <form action="/predict" method="post">
    <textarea name="email" placeholder="Enter email..."
      required maxlength="10000">
      {% if email %}{{ email }}{% endif %}
    </textarea>
    <br><br>
    <button type="submit">Predict</button>
  </form>
 
  {% if error %}
    <div class="error">⚠️ {{ error }}</div>
  {% endif %}
 
  {% if prediction %}
    {% if prediction == "spam" %}
      <h2 class="spam">🚨 Spam Email</h2>
    {% else %}
      <h2 class="ham">✅ Not Spam</h2>
    {% endif %}
    {% if confidence %}
      <p class="confidence">Confidence: {{ confidence }}%</p>
    {% endif %}
  {% endif %}
</div>
</body>
</html>
